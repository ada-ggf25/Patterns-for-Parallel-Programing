name: Lint — C++

on:
  push:
    branches: [main]
    paths:
      - 'snippets/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.cppcheck-suppressions'
      - '.github/workflows/lint-cpp.yml'
  pull_request:
    paths:
      - 'snippets/**'
      - '.clang-format'
      - '.clang-tidy'

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: clang-format --dry-run
        run: |
          files=$(find snippets \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) -print)
          if [ -z "$files" ]; then exit 0; fi
          echo "$files" | xargs clang-format-18 --dry-run --Werror

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-tidy-18 libomp-18-dev cmake ninja-build
      - name: Fetch doctest.h
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/doctest/doctest/v2.4.11/doctest/doctest.h \
            -o snippets/third_party/doctest.h
      - name: Generate compile_commands.json
        run: |
          cmake -S snippets -B snippets/build/tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18
          cmake --build snippets/build/tidy -j
      - name: Run clang-tidy
        run: |
          files=$(find snippets \( -name '*.cpp' \) -not -path 'snippets/build/*' -not -path 'snippets/third_party/*')
          if [ -z "$files" ]; then exit 0; fi
          for f in $files; do
            clang-tidy-18 -p snippets/build/tidy "$f" || exit 1
          done

  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --std=c++20 --quiet --error-exitcode=1 \
            --suppressions-list=.cppcheck-suppressions \
            snippets
